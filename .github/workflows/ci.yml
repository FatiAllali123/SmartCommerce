# ==============================================================
# CI/CD - GitHub Actions
# ==============================================================
# Ce fichier lance automatiquement les tests a chaque commit.
# Il s'execute quand on fait un push ou une pull request.
# ==============================================================

name: CI - Smart eCommerce Intelligence

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest

    steps:
      # 1. Recuperer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Installer les dependances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Verifier la qualite du code (linting)
      - name: Code linting
        run: |
          pip install flake8
          flake8 ml/ scraping/ llm/ --max-line-length=120 --extend-ignore=E402,E302,E303,E305,F541,F841,W293,W391,E131,E122,E128,E226,E231,F401


      # 5. Verifier que les imports fonctionnent
      - name: Verify imports
        run: |
          python -c "from ml.preprocessing import DataPreprocessor; print('Preprocessing OK')"
          python -c "from ml.models import RandomForestModel, XGBoostModel, KMeansModel; print('Models OK')"
          python -c "from llm.enrichment import LLMEnricher; print('LLM OK')"

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short

      # 6. Verifier que les donnees existent
      - name: Check data files
        run: |
          python -c "
          import os
          files = ['data/processed/products_clean.csv']
          for f in files:
              if os.path.exists(f):
                  print(f'  OK: {f}')
              else:
                  print(f'  MISSING: {f}')
          "

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ecommerce-dashboard .

      - name: Verify Docker image
        run: docker images ecommerce-dashboard

